<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300,400,500,700,800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVP5IRHetBo7JDSRLteQOFX4fhsts3ur0",
            authDomain: "chat-94032.firebaseapp.com",
            projectId: "chat-94032",
            storageBucket: "chat-94032.firebasestorage.app",
            messagingSenderId: "920803161623",
            appId: "1:920803161623:web:a2995a99c07b42af1d0e52"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.firebaseDb = db;
        window.firebaseAuth = auth;
        window.firestoreFunctions = { collection, addDoc, query, where, getDocs };
        window.authFunctions = { createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile };
    </script>
    
    <style>
        /* ... (نفس CSS السابق بدون تغيير) ... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #1e3a5f;
            --primary-light: #2c5282;
            --primary-dark: #152a45;
            --secondary: #c9a227;
            --secondary-light: #d4b43a;
            --background: #f8fafc;
            --surface: #ffffff;
            --surface-alt: #f1f5f9;
            --text: #1e293b;
            --text-light: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --error: #dc2626;
            --success: #059669;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        [data-theme="dark"] {
            --primary: #3b82f6;
            --primary-light: #60a5fa;
            --primary-dark: #1d4ed8;
            --secondary: #fbbf24;
            --background: #0f172a;
            --surface: #1e293b;
            --surface-alt: #334155;
            --text: #f8fafc;
            --text-light: #cbd5e1;
            --text-muted: #94a3b8;
            --border: #334155;
            --border-light: #475569;
        }

        body {
            background-color: var(--background);
            min-height: 100vh;
            color: var(--text);
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: white;
            font-size: 13px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .islamic-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .crescent {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            box-shadow: -12px 0 0 0 var(--primary);
            transform: rotate(-30deg);
            position: relative;
            animation: float 3s ease-in-out infinite;
        }

        .star {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            background: var(--secondary);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: rotate 10s linear infinite;
        }

        @keyframes float {
            0%, 100% { transform: rotate(-30deg) translateY(0); }
            50% { transform: rotate(-30deg) translateY(-10px); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .app-name {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .tagline {
            color: var(--text-light);
            font-size: 14px;
        }

        .form-container {
            background: var(--surface);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow-xl);
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            background: var(--surface-alt);
            border-radius: 12px;
            padding: 6px;
            position: relative;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s;
            color: var(--text-light);
            border: none;
            background: transparent;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .form-label span {
            color: var(--error);
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: var(--background);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(30, 58, 95, 0.1);
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
        }

        .password-toggle {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
        }

        .country-select {
            position: relative;
        }

        .country-trigger {
            width: 100%;
            padding: 14px 16px;
            background: var(--background);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .country-trigger.active {
            border-color: var(--primary);
        }

        .country-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .country-flag {
            font-size: 20px;
        }

        .country-code {
            color: var(--text-muted);
            font-size: 13px;
            background: var(--surface-alt);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .dropdown-arrow {
            color: var(--text-muted);
        }

        .country-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            max-height: 280px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: var(--shadow-xl);
        }

        .country-dropdown.show {
            display: block;
        }

        .search-box {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--surface);
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
        }

        .country-item {
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .country-item:hover {
            background: var(--surface-alt);
        }

        .phone-group {
            display: flex;
            gap: 10px;
        }

        .country-code-box {
            background: var(--surface-alt);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            color: var(--primary);
            font-weight: 700;
            min-width: 80px;
            text-align: center;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30, 58, 95, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        .spinner.show {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .form-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .error-message {
            color: var(--error);
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .toast {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--success);
            color: white;
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: 600;
            box-shadow: var(--shadow-xl);
            z-index: 9999;
            opacity: 0;
            transition: all 0.4s;
        }

        .toast.error {
            background: var(--error);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-title">👋 مرحباً</div>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
            <span id="themeIcon">☀️</span>
        </button>
    </div>

    <div class="container">
        <div class="logo-section">
            <div class="islamic-icon">
                <div class="crescent"></div>
                <div class="star"></div>
            </div>
            <h1 class="app-name">تسجيل الدخول</h1>
            <p class="tagline">سجل دخولك أو أنشئ حساباً جديداً</p>
        </div>

        <div class="form-container">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">تسجيل الدخول</button>
                <button class="tab" onclick="switchTab('register')">إنشاء حساب</button>
            </div>

            <!-- Login Form -->
            <div class="form-section active" id="loginForm">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">اسم المستخدم <span>*</span></label>
                        <div class="input-wrapper">
                            <input type="text" class="form-input" id="loginUsername" placeholder="mohammed_ahmed" required>
                            <span class="input-icon">👤</span>
                        </div>
                        <div class="error-message" id="loginUsernameError">اسم المستخدم مطلوب</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">كلمة المرور <span>*</span></label>
                        <div class="input-wrapper">
                            <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">👁️</button>
                        </div>
                        <div class="error-message" id="loginPasswordError">كلمة المرور مطلوبة</div>
                    </div>

                    <button type="submit" class="submit-btn" id="loginBtn">
                        <span>تسجيل الدخول</span>
                        <span class="spinner" id="loginSpinner"></span>
                    </button>
                </form>

                <div class="form-footer">
                    <a href="#" class="form-link" onclick="showToast('سيتم إرسال رابط إعادة التعيين')">نسيت كلمة المرور؟</a>
                </div>
            </div>

            <!-- Register Form -->
            <div class="form-section" id="registerForm">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label">الاسم الكامل <span>*</span></label>
                        <div class="input-wrapper">
                            <input type="text" class="form-input" id="fullName" placeholder="محمد أحمد عبدالله" required>
                            <span class="input-icon">✏️</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">اسم المستخدم <span>*</span></label>
                        <div class="input-wrapper">
                            <input type="text" class="form-input" id="regUsername" placeholder="mohammed_ahmed" required>
                            <span class="input-icon">👤</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">تاريخ الميلاد <span>*</span></label>
                        <div class="input-wrapper">
                            <input type="date" class="form-input" id="birthDate" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">الدولة <span>*</span></label>
                        <div class="country-select" id="countrySelect">
                            <div class="country-trigger" onclick="toggleCountryList()">
                                <div class="country-info">
                                    <span class="country-flag" id="selectedFlag">🇸🇦</span>
                                    <span id="selectedCountry">المملكة العربية السعودية</span>
                                </div>
                                <div style="display: flex; align-items: center;">
                                    <span class="country-code" id="selectedCode">+966</span>
                                    <span class="dropdown-arrow">▼</span>
                                </div>
                            </div>
                            <div class="country-dropdown" id="countryDropdown">
                                <div class="search-box">
                                    <input type="text" class="search-input" id="countrySearch" placeholder="البحث في الدول..." oninput="filterCountries()">
                                </div>
                                <div id="countriesContainer"></div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">رقم الهاتف <span>*</span></label>
                        <div class="phone-group">
                            <div class="country-code-box" id="phoneCode">+966</div>
                            <input type="tel" class="form-input" id="phoneNumber" placeholder="5xxxxxxxx" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">كلمة المرور <span>*</span></label>
                        <div class="input-wrapper">
                            <input type="password" class="form-input" id="regPassword" placeholder="••••••••" required minlength="6">
                            <button type="button" class="password-toggle" onclick="togglePassword('regPassword', this)">👁️</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">تأكيد كلمة المرور <span>*</span></label>
                        <div class="input-wrapper">
                            <input type="password" class="form-input" id="confirmPassword" placeholder="••••••••" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)">👁️</button>
                        </div>
                        <div class="error-message" id="passwordMatchError">كلمات المرور غير متطابقة</div>
                    </div>

                    <button type="submit" class="submit-btn" id="registerBtn">
                        <span>إنشاء حساب جديد</span>
                        <span class="spinner" id="registerSpinner"></span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span>✓</span>
        <span id="toastMessage">تم بنجاح!</span>
    </div>

    <script type="module">
        // Wait for Firebase to initialize
        await new Promise(resolve => setTimeout(resolve, 500));
        
        const db = window.firebaseDb;
        const auth = window.firebaseAuth;
        const { collection, addDoc, query, where, getDocs } = window.firestoreFunctions;
        const { createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } = window.authFunctions;

        // Country Data
        const countries = [
            { code: 'SA', name: 'المملكة العربية السعودية', dial: '+966', flag: '🇸🇦' },
            { code: 'AE', name: 'الإمارات العربية المتحدة', dial: '+971', flag: '🇦🇪' },
            { code: 'KW', name: 'دولة الكويت', dial: '+965', flag: '🇰🇼' },
            { code: 'QA', name: 'دولة قطر', dial: '+974', flag: '🇶🇦' },
            { code: 'BH', name: 'مملكة البحرين', dial: '+973', flag: '🇧🇭' },
            { code: 'OM', name: 'سلطنة عمان', dial: '+968', flag: '🇴🇲' },
            { code: 'EG', name: 'جمهورية مصر العربية', dial: '+20', flag: '🇪🇬' },
            { code: 'JO', name: 'المملكة الأردنية الهاشمية', dial: '+962', flag: '🇯🇴' },
            { code: 'LB', name: 'الجمهورية اللبنانية', dial: '+961', flag: '🇱🇧' },
            { code: 'IQ', name: 'جمهورية العراق', dial: '+964', flag: '🇮🇶' },
            { code: 'SY', name: 'الجمهورية العربية السورية', dial: '+963', flag: '🇸🇾' },
            { code: 'PS', name: 'دولة فلسطين', dial: '+970', flag: '🇵🇸' },
            { code: 'SD', name: 'جمهورية السودان', dial: '+249', flag: '🇸🇩' },
            { code: 'LY', name: 'دولة ليبيا', dial: '+218', flag: '🇱🇾' },
            { code: 'TN', name: 'الجمهورية التونسية', dial: '+216', flag: '🇹🇳' },
            { code: 'DZ', name: 'الجمهورية الجزائرية', dial: '+213', flag: '🇩🇿' },
            { code: 'MA', name: 'المملكة المغربية', dial: '+212', flag: '🇲🇦' },
            { code: 'YE', name: 'الجمهورية اليمنية', dial: '+967', flag: '🇾🇪' },
            { code: 'US', name: 'الولايات المتحدة الأمريكية', dial: '+1', flag: '🇺🇸' },
            { code: 'GB', name: 'المملكة المتحدة', dial: '+44', flag: '🇬🇧' }
        ];

        let selectedCountry = countries[0];

        // Theme Management
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            document.getElementById('themeIcon').textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        window.toggleTheme = toggleTheme;

        // Tab Switching
        window.switchTab = function(tab) {
            const tabs = document.querySelectorAll('.tab');
            const sections = document.querySelectorAll('.form-section');
            
            tabs.forEach(t => t.classList.remove('active'));
            sections.forEach(s => s.classList.remove('active'));
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        };

        // Country Functions
        function renderCountries(countriesList) {
            const container = document.getElementById('countriesContainer');
            let html = '';
            for (let i = 0; i < countriesList.length; i++) {
                const country = countriesList[i];
                const selectedClass = selectedCountry.code === country.code ? 'style="background: rgba(30, 58, 95, 0.1);"' : '';
                html += '<div class="country-item" onclick="selectCountry(\'' + country.code + '\')" ' + selectedClass + '>' +
                    '<span>' + country.flag + '</span>' +
                    '<span style="flex: 1;">' + country.name + '</span>' +
                    '<span style="color: var(--text-muted); font-size: 13px;">' + country.dial + '</span>' +
                    '</div>';
            }
            container.innerHTML = html;
        }

        window.toggleCountryList = function() {
            const list = document.getElementById('countryDropdown');
            const trigger = document.querySelector('.country-trigger');
            list.classList.toggle('show');
            trigger.classList.toggle('active');
        };

        window.selectCountry = function(code) {
            selectedCountry = countries.find(c => c.code === code);
            document.getElementById('selectedFlag').textContent = selectedCountry.flag;
            document.getElementById('selectedCountry').textContent = selectedCountry.name;
            document.getElementById('selectedCode').textContent = selectedCountry.dial;
            document.getElementById('phoneCode').textContent = selectedCountry.dial;
            toggleCountryList();
        };

        window.filterCountries = function() {
            const search = document.getElementById('countrySearch').value.toLowerCase();
            const filtered = countries.filter(c => 
                c.name.toLowerCase().includes(search) || 
                c.dial.includes(search)
            );
            renderCountries(filtered);
        };

        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            const select = document.getElementById('countrySelect');
            if (select && !select.contains(e.target)) {
                const dropdown = document.getElementById('countryDropdown');
                const trigger = document.querySelector('.country-trigger');
                if (dropdown) dropdown.classList.remove('show');
                if (trigger) trigger.classList.remove('active');
            }
        });

        // Password Toggle
        window.togglePassword = function(inputId, btn) {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            btn.textContent = isPassword ? '🙈' : '👁️';
        };

        // Toast
        window.showToast = function(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toast.className = 'toast' + (isError ? ' error' : '');
            toastMessage.textContent = message;
            toast.classList.add('show');
            
            setTimeout(function() {
                toast.classList.remove('show');
            }, 3000);
        };

        // Set Loading State
        function setLoading(btnId, spinnerId, isLoading) {
            const btn = document.getElementById(btnId);
            const spinner = document.getElementById(spinnerId);
            if (btn) btn.disabled = isLoading;
            if (spinner) spinner.classList.toggle('show', isLoading);
        }

        // LOGIN FUNCTION - Login with username
        window.handleLogin = async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            setLoading('loginBtn', 'loginSpinner', true);
            
            try {
                // First, find the user by username in Firestore
                const usersRef = collection(db, 'users');
                const q = query(usersRef, where('username', '==', username));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    showToast('اسم المستخدم غير صحيح', true);
                    setLoading('loginBtn', 'loginSpinner', false);
                    return;
                }
                
                // Get user data - use authEmail for login
                let userEmail = null;
                querySnapshot.forEach((doc) => {
                    const userData = doc.data();
                    userEmail = userData.authEmail; // Use hidden authEmail
                });
                
                if (!userEmail) {
                    showToast('حدث خطأ في تسجيل الدخول', true);
                    setLoading('loginBtn', 'loginSpinner', false);
                    return;
                }
                
                // Now login with email and password
                const userCredential = await signInWithEmailAndPassword(auth, userEmail, password);
                const user = userCredential.user;
                
                showToast('تم تسجيل الدخول بنجاح!');
                
                // Redirect to home page after 1 second
                setTimeout(function() {
                    window.location.href = 'home.html';
                }, 1000);
                
            } catch (error) {
                console.error('Login error:', error);
                let errorMessage = 'فشل تسجيل الدخول';
                
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'المستخدم غير موجود';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'كلمة المرور غير صحيحة';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'البريد الإلكتروني غير صالح';
                }
                
                showToast(errorMessage, true);
            } finally {
                setLoading('loginBtn', 'loginSpinner', false);
            }
        };

        // REGISTER FUNCTION - Saves to Firebase
        window.handleRegister = async function(e) {
            e.preventDefault();
            
            // Get all form values
            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const birthDate = document.getElementById('birthDate').value;
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Generate synthetic email from username (required for Firebase Auth)
            const syntheticEmail = username + '@app.local';
            
            // Validation
            if (password !== confirmPassword) {
                document.getElementById('passwordMatchError').classList.add('show');
                showToast('كلمات المرور غير متطابقة', true);
                return;
            } else {
                document.getElementById('passwordMatchError').classList.remove('show');
            }
            
            setLoading('registerBtn', 'registerSpinner', true);
            
            try {
                // 1. Check if username already exists
                const usersRef = collection(db, 'users');
                const q = query(usersRef, where('username', '==', username));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    showToast('اسم المستخدم مستخدم بالفعل', true);
                    setLoading('registerBtn', 'registerSpinner', false);
                    return;
                }
                
                // 2. Create user in Firebase Authentication using synthetic email
                const userCredential = await createUserWithEmailAndPassword(auth, syntheticEmail, password);
                const user = userCredential.user;
                
                // 3. Update profile with display name
                await updateProfile(user, {
                    displayName: fullName
                });
                
                // 4. Save additional user data to Firestore (without displaying email)
                const userData = {
                    uid: user.uid,
                    fullName: fullName,
                    username: username,
                    authEmail: syntheticEmail, // Hidden from users, used for Firebase Auth only
                    password: password, // Stored for display in dashboard (not recommended for production)
                    birthDate: birthDate,
                    country: selectedCountry.name,
                    countryCode: selectedCountry.code,
                    phoneCode: selectedCountry.dial,
                    phoneNumber: phoneNumber,
                    createdAt: new Date(),
                    isActive: true,
                    isBlocked: false,
                    lastLogin: new Date()
                };
                
                await addDoc(collection(db, 'users'), userData);
                
                showToast('تم إنشاء الحساب بنجاح!');
                
                // Redirect to home page after 1.5 seconds
                setTimeout(function() {
                    window.location.href = 'home.html';
                }, 1500);
                
            } catch (error) {
                console.error('Registration error:', error);
                let errorMessage = 'فشل إنشاء الحساب';
                
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'اسم المستخدم مستخدم بالفعل';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'البريد الإلكتروني غير صالح';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'كلمة المرور ضعيفة جداً (6 أحرف على الأقل)';
                }
                
                showToast(errorMessage, true);
            } finally {
                setLoading('registerBtn', 'registerSpinner', false);
            }
        };

        // Initialize
        initTheme();
        renderCountries(countries);
    </script>
</body>
</html>
